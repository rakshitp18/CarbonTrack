spring:
  application:
    name: carbontrack

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carbontrack}
    username: ${DB_USERNAME:carbontrack}
    password: ${DB_PASSWORD:carbontrack}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway owns schema evolution; Hibernate must never auto-generate DDL.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

app:
  jwt:
    # Base64-encoded HMAC-SHA256 secret. Override via env var in every real deployment.
    secret: ${JWT_SECRET:ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kLTEyMzQ1Njc4OTA=}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:3600000}      # 1 hour
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000} # 7 days
    issuer: carbontrack-api

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.team7.carbontrack: INFO
    org.springframework.security: INFO
