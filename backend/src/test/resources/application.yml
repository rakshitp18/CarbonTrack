spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kLTEyMzQ1Njc4OTA=}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:3600000}      # 1 hour
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000} # 7 days
    issuer: carbontrack-api

